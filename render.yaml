# Render one-click deploy. See https://render.com/docs/blueprint-spec
services:
  - type: web
    name: virallab
    env: python
    buildCommand: pip install -r requirements-render.txt
    startCommand: python server.py
    envVars:
      - key: PORT
        generateValue: true
      - key: CRON_SECRET
        generateValue: true
