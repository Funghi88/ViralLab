# Render one-click deploy. See https://render.com/docs/blueprint-spec
services:
  - type: web
    name: virallab
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: PORT
        generateValue: true
      - key: CRON_SECRET
        generateValue: true
